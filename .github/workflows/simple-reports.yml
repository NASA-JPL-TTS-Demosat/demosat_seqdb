name: Generate Simple Sequence Reports

# ============================================================================
# WHAT THIS WORKFLOW DOES:
# ============================================================================
# This workflow generates simple HTML reports for all commits and tags:
#
# 1. For ANY commit:
#    - Creates reports/commits/[commit_hash]/simple_commit_report.html
#    - Lists sequences in alphabetical order
#    - Indicates if the commit has a tag or not
#
# 2. For TAGGED commits only:
#    - Also creates reports/tags/[tag_name]/simple_tag_report.html
#    - Lists sequences in reverse alphabetical order
#    - Copies the commit report to the tag directory for reference
#
# All reports are published to the gh-pages branch for easy access.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - master
  push:
    tags:
      - '*'  # This will trigger the workflow when any tag is pushed

# Add permissions to allow GitHub Actions to push to gh-pages and comment on PRs
permissions:
  contents: write  # This is required to push to gh-pages
  issues: write    # This is required to comment on PRs (PRs are treated as issues)
  pull-requests: write # This is required for PR-specific operations

jobs:
  generate-simple-reports:
    name: Generate Simple Sequence Reports
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # For PRs, use the PR head SHA; for tag pushes, the default ref is fine
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
          fetch-depth: 0
          # Use the built-in token with write permissions
          token: ${{ github.token }}
      
      # Load configuration values
      - name: Load Configuration
        id: load-config
        run: |
          # Install PyYAML if needed
          pip install pyyaml
          
          # Extract values from config if the file exists
          if [ -f ".github/seqdb-config.yml" ]; then
            PYTHON_VERSION=$(python -c "import yaml; print(yaml.safe_load(open('.github/seqdb-config.yml')).get('environment', {}).get('python_version', '3.11'))")
          else
            PYTHON_VERSION="3.11"
          fi
          
          # Set outputs
          echo "python_version=$PYTHON_VERSION" >> $GITHUB_OUTPUT
          echo "Using Python version: $PYTHON_VERSION"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.load-config.outputs.python_version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      
      - name: Generate Simple Reports
        id: generate-reports
        run: |
          # Get commit hash
          COMMIT_HASH=$(git rev-parse HEAD)
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          
          # Fetch all tags to ensure we have the latest
          git fetch --tags --force
          
          # Check if this is a tag push event
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            # For tag push events, use the tag from the ref
            TAG="${{ github.ref_name }}"
            echo "Event is a tag push: $TAG"
          else
            # For PR events or other pushes, check if the commit has a tag
            # Use a more reliable method that doesn't require exact match
            TAG=$(git tag --points-at $COMMIT_HASH | head -n 1)
            echo "Checking for tag on commit: $COMMIT_HASH"
          fi
          
          # Set outputs based on tag presence
          if [ -n "$TAG" ]; then
            echo "Tag found: $TAG"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "has_tag=true" >> $GITHUB_OUTPUT
          else
            echo "No tag found"
            echo "has_tag=false" >> $GITHUB_OUTPUT
          fi
          
          # Double check with another method
          ALL_TAGS=$(git tag --points-at $COMMIT_HASH)
          echo "All tags pointing at this commit:"
          echo "$ALL_TAGS"
          
          # Create reports directory
          mkdir -p reports
          
          # Run the report generation script with tag information
          if [ -n "$TAG" ]; then
            echo "Running script with tag: $TAG"
            # Export tag as environment variable as well (belt and suspenders approach)
            export GITHUB_TAG="$TAG"
            python scripts/generate_simple_reports.py --output-dir reports --commit "$COMMIT_HASH" --tag "$TAG"
          else
            echo "Running script without tag"
            python scripts/generate_simple_reports.py --output-dir reports --commit "$COMMIT_HASH"
          fi
          
          # Print report paths for debugging
          echo "Generated reports in:"
          find reports -type f | sort
      
      - name: Upload Reports as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simple-sequence-reports-${{ github.sha }}
          path: reports/
          retention-days: 30
      
      - name: Publish Reports to gh-pages
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # First, save the reports to a temporary location
          mkdir -p /tmp/reports_backup
          cp -r reports/* /tmp/reports_backup/
          
          # Create/switch to gh-pages branch with force to handle untracked files
          if git fetch origin gh-pages; then
            # Use -f to force checkout even if there are untracked files that would be overwritten
            git checkout -f gh-pages || {
              echo "Force checkout failed, trying alternative approach"
              # If force checkout fails, create a new branch
              git checkout --orphan temp_gh_pages
              git reset --hard
              git commit --allow-empty -m "Creating clean gh-pages branch"
              git checkout -f temp_gh_pages
            }
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi
          
          # Get commit hash and tag from previous step
          COMMIT_HASH="${{ steps.generate-reports.outputs.commit_hash }}"
          TAG="${{ steps.generate-reports.outputs.tag }}"
          HAS_TAG="${{ steps.generate-reports.outputs.has_tag }}"
          
          # Debug information
          echo "Commit hash: $COMMIT_HASH"
          echo "Tag: $TAG"
          echo "Has tag: $HAS_TAG"
          
          # Double-check tag existence (as a fallback)
          if [ "$HAS_TAG" != "true" ] && [ -n "$TAG" ]; then
            echo "Tag was detected but has_tag is not true, fixing..."
            HAS_TAG="true"
          fi
          
          # Restore reports from temporary location
          mkdir -p /tmp/to_publish
          
          # Create directory structure for commits
          mkdir -p "/tmp/to_publish/commits/${COMMIT_HASH}"
          
          # Copy commit reports (only copy if source exists)
          if [ -d "/tmp/reports_backup/commits/${COMMIT_HASH}" ]; then
            echo "Copying commit reports from backup"
            cp -r /tmp/reports_backup/commits/${COMMIT_HASH}/* "/tmp/to_publish/commits/${COMMIT_HASH}/"
          fi
          
          # Handle tag reports if this commit has a tag
          if [ "$HAS_TAG" = "true" ]; then
            echo "Processing tag: $TAG"
            mkdir -p "/tmp/to_publish/tags/${TAG}"
            
            # Copy tag reports if they exist
            if [ -d "/tmp/reports_backup/tags/${TAG}" ]; then
              echo "Copying tag reports from backup"
              cp -r /tmp/reports_backup/tags/${TAG}/* "/tmp/to_publish/tags/${TAG}/"
            fi
          fi
          
          # Now copy everything from temp to the current directory
          echo "Publishing reports to gh-pages"
          cp -r /tmp/to_publish/* .
          
          # Update index page with links to reports
          cat > index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
              <title>Sequence Database Reports</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 40px; }
                  h1 { color: #333; }
                  .section { margin-bottom: 30px; }
                  .report-link { margin: 10px 0; }
                  .timestamp { color: #666; font-size: 0.8em; margin-top: 20px; }
              </style>
          </head>
          <body>
              <h1>Sequence Database Reports</h1>
              <p>Last updated: $(date)</p>
              
              <div class="section">
                  <h2>Latest Reports</h2>
                  <div class="report-link">
                      <a href="commits/${COMMIT_HASH}/simple_commit_report.html">Commit Report: ${COMMIT_HASH}</a>
                  </div>
          EOF
          
          if [ "$HAS_TAG" = "true" ]; then
            cat >> index.html <<EOF
                  <div class="report-link">
                      <a href="tags/${TAG}/simple_tag_report.html">Tag Report: ${TAG}</a>
                  </div>
          EOF
          fi
          
          cat >> index.html <<EOF
              </div>
              
              <p class="timestamp">Generated by GitHub Actions</p>
          </body>
          </html>
          EOF
          
          # Commit and push
          git add .
          git commit -m "Add simple reports for commit ${COMMIT_HASH} $([ -n "$TAG" ] && echo "and tag ${TAG}")" || true
          git push origin gh-pages
          
          # Switch back
          git checkout -
      
      - name: Comment on PR with Report Links
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const commitHash = '${{ steps.generate-reports.outputs.commit_hash }}';
            const hasTag = '${{ steps.generate-reports.outputs.has_tag }}' === 'true';
            const tag = '${{ steps.generate-reports.outputs.tag }}';
            const repo = context.repo;
            
            let comment = `## 📊 Simple Sequence Reports Generated
            
            **Commit:** \`${commitHash}\`
            
            ### 📥 View Reports
            
            - [View Commit Report](https://${repo.owner}.github.io/${repo.repo}/commits/${commitHash}/simple_commit_report.html)
            `;
            
            if (hasTag) {
              comment += `- [View Tag Report](https://${repo.owner}.github.io/${repo.repo}/tags/${tag}/simple_tag_report.html)
              
              **Tag:** \`${tag}\`
              `;
            } else {
              comment += `
              
              > ℹ️ This commit is not tagged. Only commit reports were generated.
              `;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: repo.owner,
              repo: repo.repo,
              body: comment
            });
